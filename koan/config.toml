# koan — shareable defaults (safe to commit to dotfiles)

[organize]

[playback]
pre_amp_db = 0.0
replaygain = "album"
show_fps = false
software_volume = false
target_fps = 60
ticker_fps = 8

[remote]
download_workers = 5
enabled = false
transcode_quality = "original"
url = ""
username = ""

[visualizer]
amplitude_scale = "aweight"
bar_decay_ms = 50
enabled = true
fps = 60
peak_decay_ms = 180
scale = "bark"
